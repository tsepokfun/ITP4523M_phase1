<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Customer Profile</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Update Customer Profile</h1>
    <div class="card-container">
        <form class="info-grid">

            <div class="info-item">
                <label class="info-label">Customer Name</label>
                <input type="text" name="name" value="tttteeee">
            </div>

            <div class="info-item">
                <label class="info-label">Email Address</label>
                <input type="email" name="email" value="tetetteteet@gmail.com">
            </div>

            <div class="info-item">
                <label class="info-label">Phone Number</label>
                <input type="tel" name="phone" value="123-456-7890">
            </div>

            <div class="info-item">
                <label class="info-label">Address</label>
                <input type="text" name="address" value="123 Main St, City, State">
            </div>

            <div class="info-item sex-item">
                <label class="info-label">Sex</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="sex" value="male" checked> Male
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="sex" value="female"> Female
                    </label>
                </div>
            </div>

            <div class="button-group">
                <button type="reset" class="button button-reset">Reset</button>
                <button type="submit" class="button button-primary">Save Changes</button>
            </div>
        </form>
    </div>
</body>

</html>
