<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>View Materials - Premium Living</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .table-card { background: white; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); overflow: hidden; }
        .table-toolbar { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .search-box { padding: 8px 16px; border: 1px solid #dadce0; border-radius: 24px; width: 300px; font-size: 14px; outline: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 14px 24px; border-bottom: 1px solid #e0e0e0; font-size: 14px; }
        th { font-weight: 500; color: #5f6368; font-size: 13px; text-transform: uppercase; background: #fafafa; }
        tr:hover { background-color: #f8f9fa; }
        
        /* 庫存狀態標籤 */
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .badge-healthy { background-color: #e6f4ea; color: #137333; }
        .badge-warning { background-color: #fef7e0; color: #b06000; }
        .badge-danger { background-color: #fce8e6; color: #c5221f; }
        
        .btn-text { background: none; border: none; color: #1a73e8; font-weight: 500; cursor: pointer; padding: 6px 12px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">View Materials</div>
            <div class="user-info"><span>Admin</span><div class="avatar">A</div></div>
        </div>

        <div class="content-container">
            <div class="table-card">
                <div class="table-toolbar">
                    <input type="text" class="search-box" placeholder="🔍 Search material name (mname)...">
                    <button class="btn btn-primary" style="padding: 8px 16px; border-radius: 4px; border: none; background: #1a73e8; color: white; cursor: pointer;">Generate Purchase Order</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>MID</th>
                            <th>Material Name (mname)</th>
                            <th>Quantity (mqty)</th>
                            <th>unit</th>
                            <th>status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 資料來自你提供的 INSERT INTO Materials -->
                        <tr>
                            <td>1</td>
                            <td>Oak Wood Plank</td>
                            <td style="font-weight: 500;">500</td>
                            <td>pcs</td>
                            <td><span class="badge badge-healthy">Sufficient inventory</span></td>
                            <td><button class="btn-text">request for Procurement</button></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Steel Tube</td>
                            <td style="font-weight: 500;">200</td>
                            <td>meter</td>
                            <td><span class="badge badge-healthy">Sufficient inventory</span></td>
                            <td><button class="btn-text">request for Procurement</button></td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Fabric Cloth</td>
                            <td style="font-weight: 500;">100</td>
                            <td>meter</td>
                            <td><span class="badge badge-warning">Low inventory</span></td>
                            <td><button class="btn-text">request for Procurement</button></td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>High Density Foam</td>
                            <td style="font-weight: 500; color: #d93025;">50</td>
                            <td>block</td>
                            <td><span class="badge badge-danger">Insufficient inventory</span></td>
                            <td><button class="btn-text">request for Procurement</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../sidebar.js"></script>
    <script> loadSidebar('view-materials'); </script>
</body>
</html>
