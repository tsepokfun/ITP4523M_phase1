<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Customer Profile</title>
    <link rel="stylesheet" href="../Style.css">
</head>

<body>
    <a href="customer.html" class="button-back">←</a>
    <h1>Update Customer Profile</h1>
    <div class="card-container"> <!-- container of customer update form -->
        <form class="info-grid">

            <div class="info-item">
                <label class="info-label">Old Password</label>
                <input type="password" name="password">
            </div>
            <div class="info-item">
                <label class="info-label">New password</label>
                <input type="password" name="newPassword">
            </div>
            <div class="info-item">
                <label class="info-label">Contact Number</label>
                <input type="tel" name="phone">
            </div>

            <div class="info-item">
                <label class="info-label">Customer Address</label>
                <input type="text" name="address">
            </div>
            <div class="button-group">
                <button type="reset" class="button button-reset">Reset</button>
                <button type="submit" class="button button-primary">Save Changes</button>
            </div>
        </form>
    </div>
</body>

</html>
