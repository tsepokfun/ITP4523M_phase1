<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Customer Profile</title>
    <link rel="stylesheet" href="../Style.css">
</head>

<body>
    <a href="../homepage.html" class="button-back">←</a>
    <h1>Customer Profile</h1>
    <div class="card-container"> <!-- container of customer form -->
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Customer Name</span>
                <span class="info-value">Chan Tai Man</span>
            </div>
            <div class="info-item">
                <span class="info-label">Email Address</span>
                <span class="info-value">123@gmail.com</span>
            </div>
            <div class="info-item">
                <span class="info-label">Contact Number</span>
                <span class="info-value">123-456-7890</span>
            </div>
            <div class="info-item">
                <span class="info-label">Customer Address</span>
                <span class="info-value">123 Main St, City, State</span>
            </div>
            <div class="info-item sex-item">
                <span class="info-label">Sex</span>
                <span class="info-value">Male</span>
            </div>

            <div class="button-group">
                <a href="customerupdate.html" class="button button-primary">Update Profile</a>
            </div>
        </div>
    </div>
</body>

</html>
