<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Make an Order</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Make an Order</h1>
    <div class="card-container">
        <div class="info-grid">
            <div class="info-item">
                <label class="info-label">Product Preview</label>
                <img id="productImage" alt="Selected Product"
                    style="max-width: 500px; border-radius: 8px; margin-top: 10px;">
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label class="info-label" for="FurnitureID">Furniture ID</label>
                    <input type="text" id="FurnitureID" readonly style="background-color: #f8f9fa;">
                </div>

                <div class="info-item">
                    <label class="info-label" for="FurnitureName">Furniture Name</label>
                    <input type="text" id="FurnitureName" readonly style="background-color: #f8f9fa;  ">
                </div>

                <div class="info-item">
                    <label class="info-label" for="customerId">Customer ID</label>
                    <input type="text" id="customerId" placeholder="Enter Customer ID">
                </div>

                <div class="info-item">
                    <label class="info-label" for="orderDate">Order Date</label>
                    <input type="date" id="orderDate">
                </div>

                <div class="info-item">
                    <label class="info-label" for="orderQuantity">Order Quantity</label>
                    <input type="number" id="orderQuantity" placeholder="Enter Quantity" min="1">
                </div>

                <div class="info-item">
                    <label class="info-label" for="totalAmount">Total Order Amount</label>
                    <input type="number" id="totalAmount" placeholder="Enter Total Order Amount" min="0" step="0.01">
                </div>
                <div class="info-item">
                    <label class="info-label" for="deliveryAddress">Delivery Address</label>
                    <input type="text" id="deliveryAddress" placeholder="Enter Delivery Address">
                </div>

                <div class="info-item">
                    <label class="info-label" for="DeliveryDate">Delivery Date</label>
                    <input type="date" id="DeliveryDate">
                </div>
            </div>
            <div class="button-group">
                <button type="submit" class="button button-primary">Submit Order</button>
                <button type="reset" class="button button-reset">Reset</button>
            </div>
        </div>
        <script>

            window.onload = function () {

                const urlParams = new URLSearchParams(window.location.search);
                const pid = urlParams.get('pid');

                if (pid) {
                    document.getElementById('FurnitureID').value = "P-" + pid;
                    document.getElementById('FurnitureName').value = "Product " + pid;
                    const imgElement = document.getElementById('productImage');
                    imgElement.src = "image/" + pid + ".png";
                }
                const name = urlParams.get('name');
                if (name) {
                    document.getElementById('FurnitureName').value = decodeURIComponent(name.replace(/\+/g, ' '));
                }

                const today = new Date().toISOString().split('T')[0];
                document.getElementById('orderDate').value = today;
            };
        </script>

</body>

</html>
